<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шарҳи моҳонаи таваррум</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/detail.css">
</head>
<body>
<div id="readProgress" class="read-progress"></div>
<button id="backToTop" class="back-to-top" aria-label="Боло">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 14V4M4 9l5-5 5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<header class="page-header">
  <div class="page-header__inner">
    <a href="../index.html" class="back-btn">Асосӣ</a>
    <span class="page-header__title">Шарҳи моҳонаи таваррум</span>
    <div class="lang-switcher">
      <button onclick="setLang('tj')" id="btn-tj">🇹🇯 ТҶ</button>
      <button onclick="setLang('ru')" id="btn-ru">🇷🇺 РУ</button>
      <button onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
    </div>
  </div>
</header>

<div class="page-wrap">
  <div class="container">
    <h1 class="page-title">Шарҳи моҳонаи таваррум</h1>
    <div id="year-nav" class="year-nav">
      <span class="year-nav__label">Соли:</span>
    </div>
    <div id="reports-list"></div>
  </div>
</div>

<script>
(function () {
  var MONTH_NAMES = ["Январ","Феврал","Март","Апрел","Май","Июн","Июл","Август","Сентябр","Октябр","Ноябр","Декабр"];
  var FIRST_YEAR  = 2016;
  var FIRST_MONTH = 9;

  var now          = new Date();
  var currentYear  = now.getFullYear();
  var currentMonth = now.getMonth() + 1;

  var nav  = document.getElementById('year-nav');
  var list = document.getElementById('reports-list');

  var pdfIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  var xlsIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>';

  for (var year = currentYear; year >= FIRST_YEAR; year--) {
    // Year nav pill
    var jump = document.createElement('button');
    jump.className = 'year-jump' + (year === currentYear ? ' current' : '');
    jump.textContent = year;
    jump.dataset.year = year;
    nav.appendChild(jump);

    var mStart = (year === FIRST_YEAR)  ? FIRST_MONTH : 1;
    var mEnd   = (year === currentYear) ? currentMonth : 12;
    var isOpen = (year === currentYear);

    // Section
    var section = document.createElement('div');
    section.className = 'year-section';
    section.id = 'year-' + year;

    // Accordion button
    var btn = document.createElement('button');
    btn.className = 'year-acc-btn' + (isOpen ? '' : ' collapsed');
    btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    btn.innerHTML = '<span class="year-acc-pill"><span>' + year + '</span><span class="year-acc-icon">▾</span></span>';

    // Months wrapper
    var wrap = document.createElement('div');
    wrap.className = 'months-wrap';
    wrap.style.maxHeight = isOpen ? '2000px' : '0';

    // Month grid
    var grid = document.createElement('div');
    grid.className = 'months';

    for (var m = mStart; m <= mEnd; m++) {
      var mm   = m < 10 ? '0' + m : '' + m;
      var card = document.createElement('div');
      card.className = 'month-card';
      card.innerHTML =
        '<div class="month-name">' + MONTH_NAMES[m - 1] + '</div>' +
        '<div class="file-btns">' +
        '<a href="files/' + year + '-' + mm + '.pdf"  class="file-btn pdf"   target="_blank" rel="noopener noreferrer">' + pdfIcon + ' PDF</a>' +
        '<a href="files/' + year + '-' + mm + '.xlsx" class="file-btn excel" target="_blank" rel="noopener noreferrer">' + xlsIcon + ' Excel</a>' +
        '</div>';
      grid.appendChild(card);
    }

    wrap.appendChild(grid);
    section.appendChild(btn);
    section.appendChild(wrap);
    list.appendChild(section);

    // Toggle logic
    (function (b, w) {
      b.addEventListener('click', function () {
        var open = !b.classList.contains('collapsed');
        if (open) {
          b.classList.add('collapsed');
          b.setAttribute('aria-expanded', 'false');
          w.style.maxHeight = '0';
        } else {
          b.classList.remove('collapsed');
          b.setAttribute('aria-expanded', 'true');
          w.style.maxHeight = '2000px';
        }
      });
    })(btn, wrap);
  }

  // Nav pill click → scroll + expand
  nav.addEventListener('click', function (e) {
    var btn = e.target.closest('.year-jump');
    if (!btn) return;
    var yr = btn.dataset.year;
    var section = document.getElementById('year-' + yr);
    if (!section) return;
    var accBtn = section.querySelector('.year-acc-btn');
    var wrap   = section.querySelector('.months-wrap');
    if (accBtn && wrap && accBtn.classList.contains('collapsed')) {
      accBtn.classList.remove('collapsed');
      accBtn.setAttribute('aria-expanded', 'true');
      wrap.style.maxHeight = '2000px';
    }
    setTimeout(function () {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  });

})();
</script>

<script>
(function () {
  var bar = document.getElementById('readProgress');
  if (bar) {
    function updateBar() {
      var doc = document.documentElement;
      bar.style.width = Math.min(doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100, 100) + '%';
    }
    window.addEventListener('scroll', updateBar, { passive: true });
  }
  var btt = document.getElementById('backToTop');
  if (btt) {
    window.addEventListener('scroll', function () {
      btt.classList.toggle('visible', window.scrollY > 320);
    }, { passive: true });
    btt.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
})();
</script>
<script src="../js/common.js"></script>
</body>
</html>
