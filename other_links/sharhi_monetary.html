<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шарҳи монетарӣ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .content-section { margin-bottom: 2.5rem; }
  .page-title { font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 800; color: var(--navy); margin-bottom: 1.2rem; line-height: 1.25; }

  .styled-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); font-size: 0.95rem;
    margin: 1.5rem 0;
  }
  .styled-table thead tr { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #1e40af 100%); color: #fff; }
  .styled-table th, .styled-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .styled-table th { font-weight: 600; font-size: 0.85rem; letter-spacing: 0.03em; }
  .styled-table tbody tr:nth-child(even) { background: var(--surface-alt); }
  .styled-table tbody tr:hover { background: #eff6ff; }

  .content-section h2 { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin: 0 0 1rem; }
  .content-section h3 { font-size: 1.05rem; font-weight: 600; color: var(--navy); margin: 1.2rem 0 0.6rem; }
  .content-section p { margin-bottom: 0.9rem; }
  .content-section ul, .content-section ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .content-section li { margin-bottom: 0.4rem; }

  .info-box {
    background: var(--blue-light, #eff6ff); border: 1px solid var(--blue, #2563eb);
    border-radius: 10px; padding: 16px 20px; margin: 1.2rem 0;
  }
  .highlight { color: var(--blue, #2563eb); font-weight: 600; }

  img.content-img { width: 100%; border-radius: 10px; margin: 1.2rem 0; }

  @media (max-width: 640px) {
    .styled-table { font-size: 0.82rem; }
    .styled-table th, .styled-table td { padding: 9px 8px; }
  }

  .title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
    text-align: center;
    margin: 1.8rem 0 2rem;
  }
  .year {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--primary);
    margin: 2rem 0 1rem;
    text-align: center;
  }

  .months {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }

  .month-card {
    background: var(--card);
    border-radius: 10px;
    box-shadow: var(--shadow);
    border: 1px solid #e5e7eb;
    padding: 12px;
    text-align: center;
    transition: transform 0.25s, box-shadow 0.25s;
  }

  .month-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }

  .month-name {
    font-weight: 600;
    margin-bottom: 8px;
  }

  .file-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 0;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9rem;
    color: white;
    font-weight: 500;
    transition: 0.2s;
  }

  .pdf { background: #d32f2f; }  /* красный */
  .pdf:hover { background: #b71c1c; }
</style>
<link rel="stylesheet" href="../css/detail.css">
</head>
<body>
<header class="page-header">
  <div class="page-header__inner">
    <a href="../index.html" class="back-btn">Асосӣ</a>
    <span class="page-header__title">Шарҳи монетарӣ</span>
    <div class="lang-switcher">
      <button onclick="setLang('tj')" id="btn-tj">🇹🇯 ТҶ</button>
      <button onclick="setLang('ru')" id="btn-ru">🇷🇺 РУ</button>
      <button onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
    </div>
  </div>
</header>

<div class="page-wrap"><div class="container">
    <h1 class="page-title">Шарҳи монетарӣ</h1>

  <script>
    const years = Array.from({length: 10}, (_, i) => 2017 + i).reverse(); //
    const months = ["Январ","Феврал","Март","Апрел","Май","Июн","Июл","Август","Сентябр","Октябр","Ноябр","Декабр"];
    const container = document.querySelector('.container');

    years.forEach(year => {
      const yearDiv = document.createElement('div');
      yearDiv.className = 'year';
      yearDiv.textContent = year;
      container.appendChild(yearDiv);

      const monthsDiv = document.createElement('div');
      monthsDiv.className = 'months';
      months.forEach((month, idx) => {
        const card = document.createElement('div');
        card.className = 'month-card';
        card.innerHTML = `
          <div class="month-name">${month}</div>
          <a href="files/${year}-${String(idx+1).padStart(2,'0')}.pdf" class="file-btn pdf">PDF</a>
        `;
        monthsDiv.appendChild(card);
      });
      container.appendChild(monthsDiv);
    });
  </script>

</div>
</div><!-- /.page-wrap -->

<script src="../js/common.js"></script>

</body>
</html>
