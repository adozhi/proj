<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шарҳи таваррум</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/detail.css">
<style>
  /* ─── Year block ─── */
  .year-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(15,23,42,0.08);
    margin-bottom: 20px;
    padding: 0;
    transition: box-shadow 0.22s ease, transform 0.22s ease;
  }
  .year-block:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(15,23,42,0.14);
  }

  /* ─── Gradient header with year ─── */
  .year-label {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #1e40af 100%);
    color: #fff;
    font-size: 1.4rem;
    font-weight: 800;
    padding: 16px 26px;
    border-bottom: none;
    margin-bottom: 0;
    letter-spacing: -0.015em;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .year-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }

  /* ─── Two-column body ─── */
  .year-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 1px solid var(--border);
  }

  /* ─── Section inside year-block — reset detail.css ─── */
  .year-block .section {
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    padding: 22px 26px;
    margin-bottom: 0;
    position: static;
  }
  .year-block .section::before { display: none; }
  .year-body .section:first-child { border-right: 1px solid var(--border); }

  /* ─── Section label ─── */
  .section-title {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.11em;
    margin-bottom: 14px;
  }

  /* ─── File buttons ─── */
  .files { display: flex; gap: 9px; flex-wrap: wrap; }

  .file-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 9px 18px;
    border-radius: 9px;
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: filter 0.18s, transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .file-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 5px 16px rgba(0,0,0,0.2);
    text-decoration: none;
    color: #fff;
  }
  .pdf   { background: #dc2626; }
  .excel { background: #16a34a; }

  /* ─── Mobile ─── */
  @media (max-width: 580px) {
    .year-body { grid-template-columns: 1fr; }
    .year-body .section:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    .year-label { font-size: 1.15rem; padding: 14px 18px; }
    .year-block .section { padding: 16px 18px; }
  }
</style>
</head>
<body>
<header class="page-header">
  <div class="page-header__inner">
    <a href="../index.html" class="back-btn">Асосӣ</a>
    <span class="page-header__title">Шарҳи таваррум</span>
    <div class="lang-switcher">
      <button onclick="setLang('tj')" id="btn-tj">🇹🇯 ТҶ</button>
      <button onclick="setLang('ru')" id="btn-ru">🇷🇺 РУ</button>
      <button onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
    </div>
  </div>
</header>
<div class="page-wrap"><div class="container">
  <h1 style="text-align:center; margin-bottom:2rem;">Шарҳи таваррум</h1>
  <main id="years-container"></main>
</div></div>

<script>
const years = Array.from({length: 10}, (_, i) => 2026 - i);
const container = document.getElementById('years-container');

years.forEach(year => {
  const block = document.createElement('div');
  block.className = 'year-block';
  block.innerHTML = `
    <div class="year-label">${year}</div>
    <div class="year-body">
      <div class="section">
        <div class="section-title">Нимсола (${year})</div>
        <div class="files">
          <a href="files/${year}-H1.pdf" class="file-btn pdf" target="_blank">↓ PDF</a>
          <a href="files/${year}-H1.xlsx" class="file-btn excel" target="_blank">↓ Excel</a>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Солона (${year})</div>
        <div class="files">
          <a href="files/${year}-full.pdf" class="file-btn pdf" target="_blank">↓ PDF</a>
          <a href="files/${year}-full.xlsx" class="file-btn excel" target="_blank">↓ Excel</a>
        </div>
      </div>
    </div>
  `;
  container.appendChild(block);
});
</script>
<script src="../js/common.js"></script>
</body>
</html>
