<!DOCTYPE html>
<html lang="tj">
<head>
<meta charset="UTF-8">
<title>Диаграмма</title>

<script src="../js/chart.umd.min.js" defer></script>
<script src="../js/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  .chart-card { margin-bottom: 2rem; }
</style>
<link rel="stylesheet" href="../css/detail.css">
</head>

<body>
<header class="page-header">
  <div class="page-header__inner">
    <a href="../index.html" class="back-btn">Асосӣ</a>
    <span class="page-header__title">Диаграммаҳо</span>
    <div class="lang-switcher">
      <button onclick="setLang('tj')" id="btn-tj">🇹🇯 ТҶ</button>
      <button onclick="setLang('ru')" id="btn-ru">🇷🇺 РУ</button>
      <button onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
    </div>
  </div>
</header>
<div class="page-wrap"><div class="container" id="charts"></div></div>


<script>

// ================= DATASETS =================
const datasets = [
  {
    id:"inflation",
    title:"Тағйирёбии сатҳи таваррум",
    color:"#3b82f6",
    mode:"yearly" // по умолчанию годовая
  },
  {id:"rate",title:"Меъёри бозтамвил",color:"#64748b"},
  {id:"bonds",title:"Фоизи қоғазҳои қиматноки БМТ",color:"#22c55e"},
  {id:"interbank",title:"Фоизи қарзҳои байнибонкӣ",color:"#f59e0b"}
];

const charts = {};

// ================= INIT =================
document.addEventListener("DOMContentLoaded",()=>{
  loadChartData();
});

// ================= LOAD EXCEL =================
async function loadChartData(){
  const res = await fetch("../data/data.xlsx");
  const buffer = await res.arrayBuffer();

  const wb = XLSX.read(buffer,{type:"array"});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet,{defval:""});

  const parsed={
    inflation:[],
    inflation_y:[], // добавили годовую
    rate:[],
    bonds:[],
    interbank:[]
  };

  const labels=[];

  json.forEach(row=>{
    const date=row.date;
    if(!date) return;

    const infl=toNum(row.inflation);
    const infl_y=toNum(row.inflation_y); // новое поле

    const rate=toNum(row.rate);
    const bonds=toNum(row.bonds);
    const interbank=toNum(row.interbank);

    // skip completely empty rows
    if(infl===null && infl_y===null && rate===null && bonds===null && interbank===null) return;

    labels.push(date);

    parsed.inflation.push(infl);
    parsed.inflation_y.push(infl_y);

    parsed.rate.push(rate);
    parsed.bonds.push(bonds);
    parsed.interbank.push(interbank);
  });

  datasets.forEach(ds=>{
    ds.labels=labels;

    if(ds.id==="inflation"){
      ds.data_monthly=parsed.inflation;
      ds.data_yearly=parsed.inflation_y;

      // по умолчанию годовая
      ds.data = ds.data_yearly;
    } else {
      ds.data=parsed[ds.id];
    }
  });

  initCharts();
}

// ================= NUMBER FIX =================
function toNum(v){
  if(v===undefined||v===null||v==="") return null;
  const n = parseFloat(String(v).replace(",", "."));
  return isNaN(n) ? null : n;
}

// ================= INIT CHARTS =================
function initCharts(){
  const container=document.getElementById("charts");
  container.innerHTML="";

  datasets.forEach(ds=>{
    const block=document.createElement("div");
    block.className="chart-card";

    block.innerHTML=`
      <div class="chart-card__header">
        <div class="chart-card__header-left">
          <h2 class="chart-card__title">${ds.title}</h2>
          ${ds.id==="inflation" ? `
          <div class="chart-type-toggle">
            <button class="chart-type-btn active" id="infl-btn-yearly" onclick="switchInflation('yearly')">Солона</button>
            <button class="chart-type-btn" id="infl-btn-monthly" onclick="switchInflation('monthly')">Моҳона</button>
          </div>` : ""}
        </div>
        <div class="chart-toolbar">
          <div class="date-range">
            <span class="date-range__label">Аз</span>
            <input type="month" id="${ds.id}-start">
            <span class="date-range-sep">—</span>
            <span class="date-range__label">То</span>
            <input type="month" id="${ds.id}-end">
          </div>
          <button class="btn-chart btn-chart--apply" onclick="updateChart('${ds.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            OK
          </button>
          <button class="btn-chart" onclick="resetChart('${ds.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
          <button class="btn-chart" onclick="exportPNG('${ds.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12l4 4 4-4"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
            PNG
          </button>
          <button class="btn-chart" onclick="exportCSV('${ds.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
            CSV
          </button>
        </div>
      </div>
      <div class="chart-card__body">
        <div class="chart-canvas-wrap">
          <canvas id="${ds.id}Chart"></canvas>
        </div>
      </div>
    `;

    container.appendChild(block);
    createChart(ds);
  });
}

// ================= Y-AXIS RANGE =================
function computeRange(values){
  const nums = values.filter(v => v !== null);
  if(!nums.length) return { min: 0, max: 10, step: 2 };
  const lo = Math.min(...nums), hi = Math.max(...nums);
  const step = hi - lo < 5 ? 1 : hi - lo < 15 ? 2 : 5;
  const mid = (lo + hi) / 2;
  const half = Math.ceil(((hi - lo) / 2 + step) / step) * step;
  return {
    min: Math.max(0, Math.floor((mid - half) / step) * step),
    max: Math.ceil((mid + half) / step) * step,
    step
  };
}

// ================= CREATE CHART =================
function createChart(ds){

  const startIndex = ds.data.findIndex(v => v !== null);
  const labels = ds.labels.slice(startIndex);
  const data = ds.data.slice(startIndex);
  const r = computeRange(data);

  const ctx=document.getElementById(ds.id+"Chart");

  charts[ds.id]=new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:ds.title,
        data,
        borderColor:ds.color,
        backgroundColor:ds.color+"33",
        fill:true,
        tension:0.4,
        pointRadius:0,
        spanGaps:true
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label: c => c.parsed.y !== null ? ` ${c.parsed.y.toFixed(1).replace('.',',')}%` : ''
          }
        }
      },
      scales:{
        x:{ticks:{ color:"#475569", maxTicksLimit:12, maxRotation:45, minRotation:45 }},
        y:{min:r.min, max:r.max, ticks:{ color:"#475569", stepSize:r.step }}
      }
    }
  });

  document.getElementById(ds.id+"-start").value=labels[0];
  document.getElementById(ds.id+"-end").value=labels[labels.length-1];
}

// ================= SWITCH INFLATION =================
function switchInflation(type){
  const ds = datasets.find(d=>d.id==="inflation");
  const chart = charts["inflation"];

  ds.mode = type;

  const allLabels = ds.labels;
  const curLabels = chart.data.labels;
  const si = allLabels.indexOf(curLabels[0]);
  const ei = allLabels.indexOf(curLabels[curLabels.length - 1]);

  const allValues = type === "monthly" ? ds.data_monthly : ds.data_yearly;
  const sliced = si >= 0 && ei >= 0 ? allValues.slice(si, ei + 1) : allValues;
  chart.data.datasets[0].data = sliced;
  chart.data.datasets[0].label = type === 'monthly' ? 'Таварруми моҳона (%)' : 'Таварруми солона (%)';

  if(type === 'monthly'){
    chart.options.scales.y.min = undefined;
    chart.options.scales.y.max = undefined;
    chart.options.scales.y.ticks.stepSize = undefined;
  } else {
    const r = computeRange(sliced.filter(v => v !== null));
    chart.options.scales.y.min = r.min;
    chart.options.scales.y.max = r.max;
    chart.options.scales.y.ticks.stepSize = r.step;
  }

  document.getElementById('infl-btn-yearly').classList.toggle('active', type==='yearly');
  document.getElementById('infl-btn-monthly').classList.toggle('active', type==='monthly');
  chart.update();
}

// ================= FILTER =================
function updateChart(id){
  const chart=charts[id];
  const ds=datasets.find(d=>d.id===id);

  const start=document.getElementById(id+"-start").value;
  const end=document.getElementById(id+"-end").value;

  let s=0,e=ds.labels.length;

  if(start){
    s=ds.labels.findIndex(l=>l>=start);
    if(s<0) s=0;
  }

  if(end){
    e=ds.labels.findIndex(l=>l>end);
    if(e<0) e=ds.labels.length;
  }

  let dataSource = ds.data;

  if(id==="inflation"){
    dataSource = ds.mode==="monthly"
      ? ds.data_monthly
      : ds.data_yearly;
  }

  chart.data.labels=ds.labels.slice(s,e);
  const filteredData=dataSource.slice(s,e);
  chart.data.datasets[0].data=filteredData;
  if(id==="inflation" && ds.mode==="monthly"){
    chart.options.scales.y.min=undefined;
    chart.options.scales.y.max=undefined;
    chart.options.scales.y.ticks.stepSize=undefined;
  } else {
    const r=computeRange(filteredData.filter(v=>v!==null));
    chart.options.scales.y.min=r.min;
    chart.options.scales.y.max=r.max;
    chart.options.scales.y.ticks.stepSize=r.step;
  }
  chart.update();
}

// ================= RESET =================
function resetChart(id){
  const chart = charts[id];
  const ds = datasets.find(d=>d.id===id);

  let rawData = ds.data;

  if(id==="inflation"){
    ds.mode = "yearly";
    rawData = ds.data_yearly;
    chart.data.datasets[0].label = 'Таварруми солона (%)';
    document.getElementById('infl-btn-yearly').classList.add('active');
    document.getElementById('infl-btn-monthly').classList.remove('active');
  }

  const startIndex = rawData.findIndex(v => v !== null);
  const labels = ds.labels.slice(startIndex);
  const data = rawData.slice(startIndex);

  chart.data.labels = labels;
  chart.data.datasets[0].data = data;

  const startInput = document.getElementById(id+"-start");
  const endInput = document.getElementById(id+"-end");
  if(startInput && endInput){
    startInput.value = labels[0];
    endInput.value = labels[labels.length-1];
  }

  const r = computeRange(data.filter(v => v !== null));
  chart.options.scales.y.min = r.min;
  chart.options.scales.y.max = r.max;
  chart.options.scales.y.ticks.stepSize = r.step;

  chart.update();
}

// ================= EXPORT PNG =================
function exportPNG(id){
  const link=document.createElement("a");
  link.download=id+".png";
  link.href=charts[id].toBase64Image();
  link.click();
}

// ================= EXPORT CSV =================
function exportCSV(id){
  const chart=charts[id];

  let csv="Date,Value\n";

  chart.data.labels.forEach((l,i)=>{
    csv+=`${l},${chart.data.datasets[0].data[i]}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");

  link.href=URL.createObjectURL(blob);
  link.download=id+".csv";
  link.click();
}


</script>
<script src="../js/common.js"></script>



</body>
</html>
