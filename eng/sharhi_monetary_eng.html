<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monetary Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/detail.css">
<style>
  .page-title {
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 1.6rem;
    line-height: 1.25;
  }

  .year-nav {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-xs);
    margin-bottom: 1.8rem;
  }
  .year-nav__label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
    white-space: nowrap;
  }
  .year-jump {
    display: inline-flex;
    align-items: center;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 700;
    background: var(--surface-alt);
    color: var(--navy);
    border: 1px solid var(--border-dark);
    transition: background 0.18s, border-color 0.18s, color 0.18s;
    cursor: pointer;
    text-decoration: none;
  }
  .year-jump:hover { background: var(--blue); color: #fff; border-color: var(--blue); text-decoration: none; }
  .year-jump.current { background: var(--blue); color: #fff; border-color: var(--blue); }

  .year-section { margin-bottom: 10px; }

  .year-acc-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    margin: 0 0 10px;
  }
  .year-acc-btn::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-left: 14px;
  }
  .year-acc-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
    color: #fff;
    font-size: 0.88rem;
    font-weight: 800;
    padding: 5px 18px;
    border-radius: 100px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(15,23,42,0.18);
    letter-spacing: -0.01em;
    transition: box-shadow 0.18s;
    user-select: none;
  }
  .year-acc-btn:hover .year-acc-pill { box-shadow: 0 4px 14px rgba(15,23,42,0.30); }
  .year-acc-icon {
    font-size: 11px;
    opacity: 0.75;
    transition: transform 0.25s;
    line-height: 1;
  }
  .year-acc-btn.collapsed .year-acc-icon { transform: rotate(-90deg); }

  .periods-wrap { overflow: hidden; transition: max-height 0.3s ease; }

  .periods {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 0.5rem;
    padding: 4px 0;
  }
  @media (max-width: 700px) { .periods { grid-template-columns: repeat(2, 1fr); } }

  .period-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px 12px;
    text-align: center;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    box-shadow: var(--shadow-xs);
  }
  .period-card:hover {
    border-color: var(--blue);
    box-shadow: 0 4px 16px rgba(37,99,235,0.13);
    transform: translateY(-2px);
  }
  .period-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .file-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 0.72rem;
    font-weight: 700;
    text-decoration: none;
    border: 1px solid transparent;
    transition: background 0.18s, border-color 0.18s, color 0.18s;
  }
  .file-btn:hover { text-decoration: none; }
  .pdf       { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .pdf:hover { background: #fecaca; border-color: #ef4444; color: #991b1b; }

  .read-progress {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    width: 0%; z-index: 9999; transition: width 0.08s linear; pointer-events: none;
  }
  .back-to-top {
    position: fixed; bottom: 28px; right: 24px;
    width: 42px; height: 42px; border-radius: 50%;
    background: #3b82f6; color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.25s, transform 0.25s, background 0.2s;
    pointer-events: none; z-index: 9998;
  }
  .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .back-to-top:hover { background: #2563eb; }
</style>
</head>
<body>
<div id="readProgress" class="read-progress"></div>
<button id="backToTop" class="back-to-top" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 14V4M4 9l5-5 5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<header class="page-header">
  <div class="page-header__inner">
    <a href="../index.html" class="back-btn">Home</a>
    <span class="page-header__title">Monetary Review</span>
    <div class="lang-switcher">
      <button onclick="setLang('tj')" id="btn-tj">🇹🇯 ТҶ</button>
      <button onclick="setLang('ru')" id="btn-ru">🇷🇺 РУ</button>
      <button onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
    </div>
  </div>
</header>

<div class="page-wrap">
  <div class="container">
    <h1 class="page-title">Monetary Review</h1>
    <div id="year-nav" class="year-nav">
      <span class="year-nav__label">Year:</span>
    </div>
    <div id="reports-list"></div>
  </div>
</div>

<script>
(function () {

  var DATA = [
    { year: 2025, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2024, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2023, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2022, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2021, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2020, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2019, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2018, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2017, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2016, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2015, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2014, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2013, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2012, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2011, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2010, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2009, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2008, periods: [
      { label: "January", slug: "01"    },
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–Jun", slug: "01-06" },
      { label: "Jan–Sep", slug: "01-09" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2007, periods: [
      { label: "Jan–Mar", slug: "01-03" },
      { label: "Jan–May", slug: "01-05" },
      { label: "Jan–Dec", slug: "01-12" }
    ]},
    { year: 2006, periods: [
      { label: "January", slug: "01"    },
      { label: "Jan–Apr", slug: "01-04" },
      { label: "Jan–May", slug: "01-05" },
      { label: "Jan–Jul", slug: "01-07" },
      { label: "Jan–Nov", slug: "01-11" },
      { label: "Jan–Dec", slug: "01-12" }
    ]}
  ];

  var pdfIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

  var nav  = document.getElementById('year-nav');
  var list = document.getElementById('reports-list');

  DATA.forEach(function (entry, idx) {
    var year   = entry.year;
    var isOpen = (idx === 0);

    var jump = document.createElement('button');
    jump.className = 'year-jump' + (isOpen ? ' current' : '');
    jump.textContent = year;
    jump.dataset.year = year;
    nav.appendChild(jump);

    var section = document.createElement('div');
    section.className = 'year-section';
    section.id = 'year-' + year;

    var btn = document.createElement('button');
    btn.className = 'year-acc-btn' + (isOpen ? '' : ' collapsed');
    btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    btn.innerHTML = '<span class="year-acc-pill"><span>' + year + '</span><span class="year-acc-icon">▾</span></span>';

    var wrap = document.createElement('div');
    wrap.className = 'periods-wrap';
    wrap.style.maxHeight = isOpen ? '2000px' : '0';

    var grid = document.createElement('div');
    grid.className = 'periods';

    entry.periods.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'period-card';
      card.innerHTML =
        '<div class="period-label">' + p.label + '</div>' +
        '<a href="files/' + year + '-' + p.slug + '.pdf" class="file-btn pdf" target="_blank" rel="noopener noreferrer">' + pdfIcon + ' PDF</a>';
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
    section.appendChild(btn);
    section.appendChild(wrap);
    list.appendChild(section);

    (function (b, w) {
      b.addEventListener('click', function () {
        var open = !b.classList.contains('collapsed');
        if (open) {
          b.classList.add('collapsed');
          b.setAttribute('aria-expanded', 'false');
          w.style.maxHeight = '0';
        } else {
          b.classList.remove('collapsed');
          b.setAttribute('aria-expanded', 'true');
          w.style.maxHeight = '2000px';
        }
      });
    })(btn, wrap);
  });

  nav.addEventListener('click', function (e) {
    var pill = e.target.closest('.year-jump');
    if (!pill) return;
    var section = document.getElementById('year-' + pill.dataset.year);
    if (!section) return;
    var accBtn = section.querySelector('.year-acc-btn');
    var wrap   = section.querySelector('.periods-wrap');
    if (accBtn && wrap && accBtn.classList.contains('collapsed')) {
      accBtn.classList.remove('collapsed');
      accBtn.setAttribute('aria-expanded', 'true');
      wrap.style.maxHeight = '2000px';
    }
    setTimeout(function () {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  });

})();
</script>

<script>
(function () {
  var bar = document.getElementById('readProgress');
  if (bar) {
    function updateBar() {
      var doc = document.documentElement;
      bar.style.width = Math.min(doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100, 100) + '%';
    }
    window.addEventListener('scroll', updateBar, { passive: true });
  }
  var btt = document.getElementById('backToTop');
  if (btt) {
    window.addEventListener('scroll', function () {
      btt.classList.toggle('visible', window.scrollY > 320);
    }, { passive: true });
    btt.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
})();
</script>
<script src="../js/common.js"></script>
</body>
</html>
